services:
  pulseboard:
    image: ghcr.io/kolapsis/pulseboard
    build: .
    container_name: pulseboard
    restart: unless-stopped
    volumes:
      - pulseboard_data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      PULSEBOARD_ADDR: "0.0.0.0:8080"
      PULSEBOARD_DB: "/data/pulseboard.db"
      PULSEBOARD_ORGANISATION_NAME: "kOlapsis"
      PULSEBOARD_MCP: true
      PULSEBOARD_MCP_ALLOWED_EMAIL: benjamin@kolapsis.com
    ports:
      - "8080:8080"
    networks:
      - shared
    extra_hosts:
      - "ackify.local:172.23.0.2"

volumes:
  pulseboard_data:

networks:
  shared:
    external: true