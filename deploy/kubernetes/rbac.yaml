# Apply with: kubectl apply -n <your-namespace> -f rbac.yaml
# The ServiceAccount is created in the target namespace automatically.
# The ClusterRoleBinding references it, so update the namespace below
# if you are NOT using "maintenant" as your namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: maintenant
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: maintenant
rules:
  # Core resources — read-only
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "namespaces", "events"]
    verbs: ["get", "list", "watch"]
  # Apps — read-only
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  # Metrics — read-only (requires metrics-server)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: maintenant
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: maintenant
subjects:
  - kind: ServiceAccount
    name: maintenant
    namespace: maintenant # ← change this to match your namespace
