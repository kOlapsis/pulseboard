site_name: PulseBoard
site_description: The all-in-one monitoring dashboard your self-hosted stack deserves.
site_url: https://docs.pulseboard.dev

repo_name: kolapsis/pulseboard
repo_url: https://github.com/kolapsis/pulseboard

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
  - Features:
      - Container Monitoring: features/containers.md
      - Endpoint Monitoring: features/endpoints.md
      - Heartbeat & Cron Monitoring: features/heartbeats.md
      - TLS Certificate Monitoring: features/certificates.md
      - Resource Metrics: features/resources.md
      - Update Intelligence: features/updates.md
      - Alert Engine: features/alerts.md
      - Public Status Page: features/status-page.md
  - Guides:
      - Docker Labels Reference: guides/docker-labels.md
      - Kubernetes Guide: guides/kubernetes.md
  - API:
      - API Reference: api/reference.md
  - Architecture: architecture.md
