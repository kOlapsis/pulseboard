<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64">
  <defs>
    <linearGradient id="signal-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3ECF8E;stop-opacity:0.5"/>
      <stop offset="60%" style="stop-color:#3ECF8E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:0.7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- M signal -->
  <polyline points="8,50 8,14 28,42 48,14 48,50" fill="none" stroke="url(#signal-grad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Trailing line -->
  <line x1="48" y1="50" x2="64" y2="50" stroke="#3ECF8E" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
  <!-- Live dot -->
  <circle cx="64" cy="50" r="3.5" fill="#3ECF8E" opacity="0.9"/>
  <!-- Wordmark -->
  <text x="80" y="44" font-family="Outfit, sans-serif" font-size="30" font-weight="600" fill="#E8ECF4" letter-spacing="-0.3">maintenant</text>
</svg>
